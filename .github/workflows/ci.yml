name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests with pytest
        run: |
          pip install pytest
          pytest app/tests.py -v
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: false
          tags: |
            devops-flask-app:latest
            devops-flask-app:${{ github.sha }}
          cache-from: type=gha,scope=main
          cache-to: type=gha,scope=main,mode=max

      - name: Verify image built
        run: |
          echo "✅ Docker image built successfully"
          echo "📦 Image tagged as: devops-flask-app:${{ github.sha }}"
          echo "🔑 Commit SHA: ${{ github.sha }}"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run security audit
        run: |
          pip install pip-audit
          pip-audit -r app/requirements.txt --ignore-vuln PYSEC-2022-42969 || true

      - name: Security scan complete
        run: echo "✅ Security scan complete"
