services:
  flask-app:
    
    build:
      context: ./app
      dockerfile: Dockerfile
    
    container_name: flask-app

    restart: unless-stopped

    env_file:
      - .env

    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    
    expose:
      - 5000
    
    volumes:
      - app-logs:/app/logs

    networks:
      - app-network
  
  redis:

    image: redis:7-alpine

    container_name: redis-cache

    volumes:
      - redis-data:/data

    expose:
      - 6379

    networks:
      - app-network
  
  nginx:
    
    image: nginx:alpine

    container_name: nginx-proxy

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - flask-app

    networks:
      - app-network

volumes:
  redis-data:
  app-logs:

networks:
  app-network:
    driver: bridge